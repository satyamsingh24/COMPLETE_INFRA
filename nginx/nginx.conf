server {
    listen 80;

    # Serve Static Files
    location / {
        root /usr/share/nginx/html;
        index register.html;
        try_files $uri $uri/ =404;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
