apiVersion: 1

datasources:
  - name: CloudWatch
    type: cloudwatch
    access: proxy
    uid: cloudwatch-main
    isDefault: true
    jsonData:
      authType: ec2_iam_role
      defaultRegion: ap-south-1
    version: 1
    editable: true

  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus-main
    url: http://prometheus:9090
    isDefault: false
    version: 1
    editable: true
    